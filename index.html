<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📺 IPTV Player</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0f;--s1:#13131a;--s2:#1c1c26;--b:#2a2a3a;--acc:#7c3aed;--acc2:#06b6d4;--txt:#e2e2f0;--mut:#6b6b8a}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden}

    header{background:var(--s1);border-bottom:1px solid var(--b);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
    header h1{font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
    .search-wrap{flex:1;position:relative;max-width:380px}
    .search-wrap input{width:100%;background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:8px 12px 8px 34px;color:var(--txt);font-size:.88rem;outline:none;transition:border-color .2s}
    .search-wrap input:focus{border-color:var(--acc)}
    .search-wrap span{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--mut)}
    select{background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:7px 10px;color:var(--txt);font-size:.82rem;outline:none;cursor:pointer}
    select:focus{border-color:var(--acc)}
    .stats{font-size:.75rem;color:var(--mut);white-space:nowrap}

    .main{display:flex;flex:1;overflow:hidden}

    .sidebar{width:300px;flex-shrink:0;background:var(--s1);border-left:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden}
    .ch-list{flex:1;overflow-y:auto;padding:6px}
    .ch-list::-webkit-scrollbar{width:3px}
    .ch-list::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}

    .ch-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:background .15s;border:1px solid transparent}
    .ch-item:hover{background:var(--s2)}
    .ch-item.active{background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.4)}
    .ch-logo{width:34px;height:34px;border-radius:6px;object-fit:contain;background:var(--s2);flex-shrink:0;padding:2px}
    .ch-fb{width:34px;height:34px;border-radius:6px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;color:#fff}
    .ch-info{flex:1;min-width:0}
    .ch-name{font-size:.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ch-grp{font-size:.72rem;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    .pager{display:flex;align-items:center;justify-content:center;gap:8px;padding:8px;border-top:1px solid var(--b)}
    .btn{background:var(--s2);border:1px solid var(--b);color:var(--txt);border-radius:6px;padding:5px 12px;cursor:pointer;font-size:.8rem;transition:all .2s}
    .btn:hover:not(:disabled){border-color:var(--acc);color:var(--acc)}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .pg-info{font-size:.78rem;color:var(--mut)}

    .player-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#000}
    .video-wrap{flex:1;position:relative;display:flex;align-items:center;justify-content:center;background:#000}
    video{width:100%;height:100%;object-fit:contain}

    .no-ch{display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--mut)}
    .no-ch .ico{font-size:3.5rem}
    .no-ch p{font-size:.9rem}

    .loading-ov,.error-ov{position:absolute;inset:0;background:rgba(0,0,0,.75);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
    .spinner{width:38px;height:38px;border:3px solid var(--b);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .err-ico{font-size:2.2rem}
    .err-msg{color:#f87171;font-size:.88rem;text-align:center;max-width:280px}

    .now-playing{background:var(--s1);border-top:1px solid var(--b);padding:9px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
    .np-logo{width:30px;height:30px;border-radius:5px;object-fit:contain;background:var(--s2)}
    .np-info{flex:1;min-width:0}
    .np-name{font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .np-grp{font-size:.72rem;color:var(--mut)}
    .live{background:#ef4444;color:#fff;font-size:.68rem;font-weight:700;padding:2px 6px;border-radius:4px;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

    .skeleton{background:linear-gradient(90deg,var(--s2) 25%,var(--b) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
    @keyframes shimmer{to{background-position:-200% 0}}
    .empty{text-align:center;padding:30px 16px;color:var(--mut);font-size:.88rem}

    @media(max-width:600px){
      .sidebar{width:100%;position:absolute;bottom:0;left:0;right:0;height:45vh;z-index:5;border-top:1px solid var(--b)}
      .player-area{height:55vh}
    }
  </style>
</head>
<body>

<header>
  <h1>📺 IPTV</h1>
  <div class="search-wrap">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="بحث عن قناة..."/>
  </div>
  <select id="groupFilter"><option value="">كل المجموعات</option></select>
  <select id="countryFilter"><option value="">كل الدول</option></select>
  <span class="stats" id="stats">جاري التحميل...</span>
</header>

<div class="main">
  <div class="player-area">
    <div class="video-wrap" id="videoWrap">
      <div class="no-ch" id="noCh"><div class="ico">📡</div><p>اختر قناة للمشاهدة</p></div>
      <video id="player" controls style="display:none"></video>
      <div class="loading-ov" id="loadOv" style="display:none"><div class="spinner"></div><span>جاري التحميل...</span></div>
      <div class="error-ov" id="errOv" style="display:none">
        <div class="err-ico">⚠️</div>
        <div class="err-msg" id="errMsg">البث غير متاح، جرب قناة أخرى.</div>
        <button class="btn" onclick="retry()">إعادة المحاولة</button>
      </div>
    </div>
    <div class="now-playing" id="nowPlaying" style="display:none">
      <img class="np-logo" id="npLogo" src="" onerror="this.style.display='none'"/>
      <div class="np-info">
        <div class="np-name" id="npName">—</div>
        <div class="np-grp" id="npGrp">—</div>
      </div>
      <span class="live">● مباشر</span>
    </div>
  </div>

  <div class="sidebar">
    <div class="ch-list" id="chList"></div>
    <div class="pager">
      <button class="btn" id="prevBtn" disabled>›</button>
      <span class="pg-info" id="pgInfo">—</span>
      <button class="btn" id="nextBtn" disabled>‹</button>
    </div>
  </div>
</div>

<script>
let page=1,pages=1,timer=null,hls=null,cur=null;
const $ = id => document.getElementById(id);

async function load(){
  const p=new URLSearchParams({page,limit:50});
  const q=$('searchInput').value.trim();
  const g=$('groupFilter').value;
  const c=$('countryFilter').value;
  if(q)p.set('search',q);
  if(g)p.set('group',g);
  if(c)p.set('country',c);
  skeleton();
  try{
    const r=await fetch('/api/channels?'+p);
    const d=await r.json();
    render(d.channels);
    pages=d.pages;
    $('pgInfo').textContent=`${d.page}/${d.pages}`;
    $('stats').textContent=`${d.total.toLocaleString()} قناة`;
    $('prevBtn').disabled=page<=1;
    $('nextBtn').disabled=page>=pages;
  }catch{$('chList').innerHTML='<div class="empty">❌ تعذر تحميل القنوات</div>';}
}

function skeleton(){
  $('chList').innerHTML=Array.from({length:8},()=>`
    <div class="ch-item">
      <div class="skeleton" style="width:34px;height:34px;border-radius:6px;flex-shrink:0"></div>
      <div style="flex:1"><div class="skeleton" style="height:11px;margin-bottom:5px;width:65%"></div>
      <div class="skeleton" style="height:9px;width:40%"></div></div></div>`).join('');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(chs){
  if(!chs.length){$('chList').innerHTML='<div class="empty">لا توجد قنوات</div>';return;}
  $('chList').innerHTML=chs.map(ch=>`
    <div class="ch-item ${cur?._id===ch._id?'active':''}" onclick='play(${JSON.stringify(ch).replace(/"/g,"&quot;")})'>
      ${ch.logo?`<img class="ch-logo" src="${esc(ch.logo)}" onerror="this.style.display='none'" loading="lazy"/>`
               :`<div class="ch-fb">${esc(ch.name.slice(0,2).toUpperCase())}</div>`}
      <div class="ch-info">
        <div class="ch-name">${esc(ch.name)}</div>
        <div class="ch-grp">${esc(ch.group)}</div>
      </div>
    </div>`).join('');
}

async function filters(){
  const [gs,cs]=await Promise.all([fetch('/api/channels/groups').then(r=>r.json()),fetch('/api/channels/countries').then(r=>r.json())]);
  $('groupFilter').innerHTML='<option value="">كل المجموعات</option>'+gs.map(g=>`<option value="${esc(g)}">${esc(g)}</option>`).join('');
  $('countryFilter').innerHTML='<option value="">كل الدول</option>'+cs.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
}

function play(ch){
  cur=ch;
  $('noCh').style.display='none';
  $('errOv').style.display='none';
  $('player').style.display='block';
  $('loadOv').style.display='flex';
  $('nowPlaying').style.display='flex';
  $('npName').textContent=ch.name;
  $('npGrp').textContent=ch.group;
  const l=$('npLogo');
  l.style.display=ch.logo?'block':'none';
  if(ch.logo)l.src=ch.logo;
  load();
  stream(ch.url);
}

function stream(url){
  if(hls){hls.destroy();hls=null;}
  $('player').pause();
  if(Hls.isSupported()){
    hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia($('player'));
    hls.on(Hls.Events.MANIFEST_PARSED,()=>{$('loadOv').style.display='none';$('player').play().catch(()=>{});});
    hls.on(Hls.Events.ERROR,(_,d)=>{if(d.fatal){$('loadOv').style.display='none';$('errOv').style.display='flex';$('errMsg').textContent='خطأ في البث: '+d.type;}});
  } else if($('player').canPlayType('application/vnd.apple.mpegurl')){
    $('player').src=url;
    $('player').addEventListener('loadedmetadata',()=>{$('loadOv').style.display='none';$('player').play().catch(()=>{});},{once:true});
    $('player').addEventListener('error',()=>{$('loadOv').style.display='none';$('errOv').style.display='flex';},{once:true});
  } else {
    $('player').src=url;
    $('loadOv').style.display='none';
  }
}

function retry(){if(cur){$('errOv').style.display='none';$('loadOv').style.display='flex';stream(cur.url);}}

$('searchInput').addEventListener('input',()=>{clearTimeout(timer);timer=setTimeout(()=>{page=1;load();},400);});
$('groupFilter').addEventListener('change',()=>{page=1;load();});
$('countryFilter').addEventListener('change',()=>{page=1;load();});
$('prevBtn').addEventListener('click',()=>{page--;load();});
$('nextBtn').addEventListener('click',()=>{page++;load();});

filters();load();
</script>
</body>
</html>
